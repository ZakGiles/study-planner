name: Release

# Build the desktop app for macOS, Windows and Linux and attach the artifacts
# to a GitHub release. Wails links the OS-native webview, so each target must be
# built on its own runner — hence the matrix.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # allow manual runs (build-only; release step is tag-gated)

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            platform: darwin/universal
            asset: study-planner-macos-universal.zip
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            asset: study-planner-windows-amd64.zip
          - name: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            asset: study-planner-linux-amd64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # WebKitGTK + GTK headers are needed to compile the Linux webview. 22.04
      # ships webkit2gtk-4.0; newer Ubuntu only has 4.1 and would need the
      # `webkit2_41` build tag.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent build/bin/study-planner.app "${{ matrix.asset }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/study-planner.exe -DestinationPath "${{ matrix.asset }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.asset }}" -C build/bin study-planner

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
